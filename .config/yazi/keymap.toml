# A TOML linter such as https://taplo.tamasfe.dev/ can use this schema to validate your config.
# If you encounter any issues, please make an issue at https://github.com/yazi-rs/schemas.
"$schema" = "https://yazi-rs.github.io/schemas/keymap.json"

[mgr]
prepend_keymap = [
  #	{on   = "l", run  = "plugin smart-enter", desc = "Enter the child directory, or open the file"},
	{on  = "y", run = [ 'shell -- for path in %s; do echo "file://$path"; done | wl-copy -t text/uri-list', "yank"]},

	{on = "q", run = "plugin confirm-quit", desc = "Confirm before quitting if multiple tabs are open"},

	{on = [ "g", "r" ], run = 'shell -- ya emit cd "$(git rev-parse --show-toplevel)"', desc="Go back to the root of the current Git repository"},
### Preview
	{ on = ["@","p"], run = "plugin toggle-pane min-parent", desc = "Toggle parent" },
    { on = ["@" ,"P" ], run = "plugin toggle-pane max-parent", desc = "Maximize parent" },
    { on = ["@" ,"c" ], run = "plugin toggle-pane min-current", desc = "Toggle current" },
    { on = ["@" ,"C" ], run = "plugin toggle-pane max-current", desc = "Maximize current" },
    { on = ["@" ,"n" ], run = "plugin toggle-pane min-preview", desc = "Toggle preview" },
    { on = ["@" ,"N" ], run = "plugin toggle-pane min-preview", desc = "Maximize preview" },
    { on = ["@" ,"0" ], run = "plugin toggle-pane reset", desc = "Reset pane ratio" },
	{ on   =["@", "+"], run  = "plugin zoom 1", desc = "Zoom in hovered file"},
	{ on   = ["@", "-"], run  = "plugin zoom -1", desc = "Zoom out hovered file"},


### Navigating parent directory
	{ on = "K", run = "plugin parent-arrow -1", desc = "Go up in parent directory"},
    { on = "J", run = "plugin parent-arrow 1", desc = "Go down in parent directory" },

	{ on = "<F9>", run = "plugin mediainfo -- toggle-metadata", desc = "Toggle media preview metadata" },
### RELATIVE MOTIONS
	{ on = [ "1" ], run = "plugin relative-motions 1", desc = "Move in relative steps" },
    { on = [ "2" ], run = "plugin relative-motions 2", desc = "Move in relative steps" },
    { on = [ "3" ], run = "plugin relative-motions 3", desc = "Move in relative steps" },
    { on = [ "4" ], run = "plugin relative-motions 4", desc = "Move in relative steps" },
    { on = [ "5" ], run = "plugin relative-motions 5", desc = "Move in relative steps" },
    { on = [ "6" ], run = "plugin relative-motions 6", desc = "Move in relative steps" },
    { on = [ "7" ], run = "plugin relative-motions 7", desc = "Move in relative steps" },
    { on = [ "8" ], run = "plugin relative-motions 8", desc = "Move in relative steps" },
    { on = [ "9" ], run = "plugin relative-motions 9", desc = "Move in relative steps" },
### PROJECTS
	{on = [ "<C-q>" ], run = "plugin projects quit", desc = "Save last project and exit the process"},
	{ on = [ "P", "s" ], run = "plugin projects save", desc = "Save current project" },
	{ on = [ "P", "l" ], run = "plugin projects load", desc = "Load project" },
	{ on = [ "P", "P" ], run = "plugin projects load_last", desc = "Load last project" },
	{ on = [ "P", "L" ], run = "plugin projects 'load SomeProject'", desc = "Load the 'SomeProject' project"},
	{ on = [ "P", "d" ], run = "plugin projects delete", desc = "Delete project" },
	{ on = [ "P", "D" ], run = "plugin projects delete_all", desc = "Delete all projects" },
	{ on = [ "P", "m" ], run = "plugin projects 'merge current'", desc = "Merge current tab to other projects" },
	{ on = [ "P", "M" ], run = "plugin projects 'merge all'", desc = "Merge current project to other projects" },
### CLOSE AND RESTORE
    { on = [ "t", "w" ], run = "plugin close-and-restore-tab close_to_left", desc = "Close the current tab and turn to left tab, or quit if it is last tab" },
    { on = [ "t", "r" ], run = "plugin close-and-restore-tab restore", desc = "Restore the closed tab" },
### CHMOD
	{ on   = [ "c", "m" ], run  = "plugin chmod", desc = "Chmod on selected files" },
### DIFF
	{ on = "<C-d>", run = "plugin diff", desc = "Diff the selected with the hovered file" },
### What size
	{ on   = [ ".", "S" ], run  = "plugin what-size", desc = "Calc size of selection or cwd" },	
### LAZY GIT
	{ on = "<C-g>", run = "plugin lazygit", desc = "run lazygit" },
### Restore deleted file with trash-cli
    # Select files/folders to restore. Input item index or range separated by comma:
    # - Restore a trashed file:
    #      What file to restore [0..4]: 4
    # - Restore multiple trashed files separated by comma, also support range:
    #      What file to restore [0..3]: 0-2, 3

    # This will throw error when there is existed file/folder
    { on = [ "d", "U" ], run = "plugin restore -- --interactive", desc = "Restore deleted files/folders (Interactive)" },
### Recycle Bin
	{ on = ["d","o"], run = "plugin recycle-bin -- open",        desc = "Open Trash" },
	{ on = ["d","e"], run = "plugin recycle-bin -- empty",       desc = "Empty Trash" },
	{ on = ["d","D"], run = "plugin recycle-bin -- emptyDays",   desc = "Empty by days deleted" },
	{ on = ["d","R"], run = "plugin recycle-bin -- delete",      desc = "Delete from Trash" },
	{ on = ["d","r"], run = "plugin recycle-bin -- restore",     desc = "Restore from Trash" },
### KDE connect
	{ on   = [ ".", "s" ], run  = "plugin kdeconnect-send", desc = "Send selected files via KDE Connect" },
### Clipboard
	{ on = "<C-y>", run = "plugin clipboard -- --action=copy --notify-unknown-display-server", desc = "Copy file to clipboard" },
### Copy file content
	{ on = ["c", "C"], run = ["plugin copy-file-contents"], desc = "Copy contents of file" },
### Smart paste
    { on = ["P", "p"], run = "plugin smart-paste", desc = "Paste into the hovered directory or CWD" },
### PREF BY LOCATION
# Toggle Hidden
    { on = [".", "."], run = [ "hidden toggle", "plugin pref-by-location -- save" ], desc = "Toggle the visibility of hidden files" },

    # Linemode
    { on = [ "m", "s" ], run = [ "linemode size", "plugin pref-by-location -- save" ],        desc = "Linemode: size" },
    { on = [ "m", "p" ], run = [ "linemode permissions", "plugin pref-by-location -- save" ], desc = "Linemode: permissions" },
    { on = [ "m", "b" ], run = [ "linemode btime", "plugin pref-by-location -- save" ],       desc = "Linemode: btime" },
    { on = [ "m", "m" ], run = [ "linemode mtime", "plugin pref-by-location -- save" ],       desc = "Linemode: mtime" },
    { on = [ "m", "o" ], run = [ "linemode owner", "plugin pref-by-location -- save" ],       desc = "Linemode: owner" },
    { on = [ "m", "n" ], run = [ "linemode none", "plugin pref-by-location -- save" ],        desc = "Linemode: none" },
    # Custom size_and_mtime linemode
    # { on = [ "u", "S" ], run = [ "linemode size_and_mtime", "plugin pref-by-location -- save" ], desc = "Show Size and Modified time" },

    # Sorting
    # Any changes during disabled state won't be saved to save file.
    { on = [ ",", "t" ], run = "plugin pref-by-location -- toggle",                                                desc = "Toggle auto-save preferences" },
    { on = [ ",", "d" ], run = "plugin pref-by-location -- disable",                                               desc = "Disable auto-save preferences" },
    # This will reset any preference changes for the current working directory (CWD),
    # then fall back to the predefined preferences in init.lua or yazi.toml.
    { on = [ ",", "R" ], run = [ "plugin pref-by-location -- reset" ],                                             desc = "Reset preference of cwd" },
    { on = [ ",", "m" ], run = [ "sort mtime --reverse=no", "linemode mtime", "plugin pref-by-location -- save" ], desc = "Sort by modified time" },
    { on = [ ",", "M" ], run = [ "sort mtime --reverse", "linemode mtime", "plugin pref-by-location -- save" ],    desc = "Sort by modified time (reverse)" },
    { on = [ ",", "b" ], run = [ "sort btime --reverse=no", "linemode btime", "plugin pref-by-location -- save" ], desc = "Sort by birth time" },
    { on = [ ",", "B" ], run = [ "sort btime --reverse", "linemode btime", "plugin pref-by-location -- save" ],    desc = "Sort by birth time (reverse)" },
    { on = [ ",", "e" ], run = [ "sort extension --reverse=no", "plugin pref-by-location -- save" ],               desc = "Sort by extension" },
    { on = [ ",", "E" ], run = [ "sort extension --reverse", "plugin pref-by-location -- save" ],                  desc = "Sort by extension (reverse)" },
    { on = [ ",", "a" ], run = [ "sort alphabetical --reverse=no", "plugin pref-by-location -- save" ],            desc = "Sort alphabetically" },
    { on = [ ",", "A" ], run = [ "sort alphabetical --reverse", "plugin pref-by-location -- save" ],               desc = "Sort alphabetically (reverse)" },
    { on = [ ",", "n" ], run = [ "sort natural --reverse=no", "plugin pref-by-location -- save" ],                 desc = "Sort naturally" },
    { on = [ ",", "N" ], run = [ "sort natural --reverse", "plugin pref-by-location -- save" ],                    desc = "Sort naturally (reverse)" },
    # --sensitive=no or --sensitive
    # { on = [ ",", "N" ], run = [ "sort natural --reverse=no --sensitive", "plugin pref-by-location -- save" ],                    desc = "Sort naturally" },
    { on = [ ",", "s" ], run = [ "sort size --reverse=no", "linemode size", "plugin pref-by-location -- save" ],   desc = "Sort by size" },
    { on = [ ",", "S" ], run = [ "sort size --reverse", "linemode size", "plugin pref-by-location -- save" ],      desc = "Sort by size (reverse)" },
    { on = [ ",", "r" ], run = [ "sort random --reverse=no", "plugin pref-by-location -- save" ],                  desc = "Sort randomly" },
]



keymap = [
	{ on = "<Esc>", run = "escape",             desc = "Exit visual mode, clear selection, or cancel search" },
	{ on = "<C-[>", run = "escape",             desc = "Exit visual mode, clear selection, or cancel search" },
	{ on = "q",     run = "quit",               desc = "Quit the process" },
	{ on = "Q",     run = "quit --no-cwd-file", desc = "Quit without outputting cwd-file" },
	{ on = "<C-c>", run = "close",              desc = "Close the current tab, or quit if it's last" },
	{ on = "<C-z>", run = "suspend",            desc = "Suspend the process" },

	# Hopping
	{ on = "k", run = "arrow prev", desc = "Previous file" },
	{ on = "j", run = "arrow next", desc = "Next file" },

	{ on = "<Up>",   run = "arrow prev", desc = "Previous file" },
	{ on = "<Down>", run = "arrow next", desc = "Next file" },

	{ on = "<C-b>", run = "arrow -100%", desc = "Move cursor up one page" },
	{ on = "<C-f>", run = "arrow 100%",  desc = "Move cursor down one page" },

	{ on = "<S-PageUp>",   run = "arrow -50%",  desc = "Move cursor up half page" },
	{ on = "<S-PageDown>", run = "arrow 50%",   desc = "Move cursor down half page" },
	{ on = "<PageUp>",     run = "arrow -100%", desc = "Move cursor up one page" },
	{ on = "<PageDown>",   run = "arrow 100%",  desc = "Move cursor down one page" },

	{ on = [ "g", "g" ], run = "arrow top", desc = "Go to top" },
	{ on = "G",          run = "arrow bot", desc = "Go to bottom" },

	# Navigation
	{ on = "h", run = "leave", desc = "Back to the parent directory" },
	{ on = "l", run = "enter", desc = "Enter the child directory" },

	{ on = "<Left>",  run = "leave", desc = "Back to the parent directory" },
	{ on = "<Right>", run = "enter", desc = "Enter the child directory" },

	{ on = "H", run = "back",    desc = "Back to previous directory" },
	{ on = "L", run = "forward", desc = "Forward to next directory" },

	# Toggle
	{ on = "<Space>", run = [ "toggle", "arrow 1" ], desc = "Toggle the current selection state" },
	{ on = "<C-a>",   run = "toggle_all --state=on", desc = "Select all files" },
	{ on = "<C-r>",   run = "toggle_all",            desc = "Invert selection of all files" },

	# Visual mode
	{ on = "v", run = "visual_mode",         desc = "Enter visual mode (selection mode)" },
	{ on = "V", run = "visual_mode --unset", desc = "Enter visual mode (unset mode)" },

	# Seeking
	{ on = "K", run = "seek -5", desc = "Seek up 5 units in the preview" },
	{ on = "J", run = "seek 5",  desc = "Seek down 5 units in the preview" },

	# Spotting
	{ on = "<Tab>", run = "spot", desc = "Spot hovered file" },

	# Operation
	{ on = "o",         run = "open --interactive",                        desc = "Open selected files" },
  { on = ["R"],   run = "shell --orphan -- dolphin --select \"%0\"",                desc = "Reveal selected files" },

  # { on = ["R"],     run  = "shell --orphan -- xdg-open \"$(dirname \"%0\")\"",   desc = "Reveal selected files" },
	{ on = "<Enter>",   run = "open",                        desc = "Open selected files" },
	{ on = "<S-Enter>", run = "open --interactive",          desc = "Open selected files interactively" },
	{ on = "y",         run = "yank",                        desc = "Yank selected files (copy)" },
	{ on = "x",         run = "yank --cut",                  desc = "Yank selected files (cut)" },
	{ on = "p",         run = "paste",                       desc = "Paste yanked files" },
	{ on = ["P","p"],         run = "paste --force",               desc = "Paste yanked files (overwrite if the destination exists)" },
	{ on = "-",         run = "link",                        desc = "Symlink the absolute path of yanked files" },
	{ on = "_",         run = "link --relative",             desc = "Symlink the relative path of yanked files" },
	{ on = "<C-->",     run = "hardlink",                    desc = "Hardlink yanked files" },
	{ on = "Y",         run = "unyank",                      desc = "Cancel the yank status" },
	{ on = "X",         run = "unyank",                      desc = "Cancel the yank status" },
	{ on = [ "d", "d" ],         run = "remove",                      desc = "Trash selected files" },
	{ on = "D",         run = "remove --permanently",        desc = "Permanently delete selected files" },
	{ on = "a",         run = "create",                      desc = "Create a file (ends with / for directories)" },
	{ on = "r",         run = "rename --cursor=before_ext",  desc = "Rename selected file(s)" },
	{ on = ";",         run = "shell --interactive",         desc = "Run a shell command" },
	{ on = ":",         run = "shell --block --interactive", desc = "Run a shell command (block until finishes)" },
	# { on = [ ".", "." ],         run = "hidden toggle",               desc = "Toggle the visibility of hidden files" },
	{ on = "s",         run = "search --via=fd",             desc = "Search files by name via fd" },
	{ on = "S",         run = "search --via=rg",             desc = "Search files by content via ripgrep" },
	{ on = "<C-s>",     run = "escape --search",             desc = "Cancel the ongoing search" },
	{ on = "Z",         run = "plugin fzf",                  desc = "Jump to a file/directory via fzf" },
	{ on = "z",         run = "plugin zoxide",               desc = "Jump to a directory via zoxide" },

	# Linemode
	{ on = [ "m", "s" ], run = "linemode size",        desc = "Linemode: size" },
	{ on = [ "m", "p" ], run = "linemode permissions", desc = "Linemode: permissions" },
	{ on = [ "m", "b" ], run = "linemode btime",       desc = "Linemode: btime" },
	{ on = [ "m", "m" ], run = "linemode mtime",       desc = "Linemode: mtime" },
	{ on = [ "m", "o" ], run = "linemode owner",       desc = "Linemode: owner" },
	{ on = [ "m", "n" ], run = "linemode none",        desc = "Linemode: none" },

	# Copy
	{ on = [ "c", "c" ], run = "copy path",             desc = "Copy the file path" },
	{ on = [ "c", "d" ], run = "copy dirname",          desc = "Copy the directory path" },
	{ on = [ "c", "f" ], run = "copy filename",         desc = "Copy the filename" },
	{ on = [ "c", "n" ], run = "copy name_without_ext", desc = "Copy the filename without extension" },

	# Filter
	{ on = "f", run = "filter --smart", desc = "Filter files" },

	# Find
	{ on = "/", run = "find --smart",            desc = "Find next file" },
	{ on = "?", run = "find --previous --smart", desc = "Find previous file" },
	{ on = "n", run = "find_arrow",              desc = "Next found" },
	{ on = "N", run = "find_arrow --previous",   desc = "Previous found" },

	# Sorting
	{ on = [ ",", "m" ], run = [ "sort mtime --reverse=no", "linemode mtime" ],  desc = "Sort by modified time" },
	{ on = [ ",", "M" ], run = [ "sort mtime --reverse=yes", "linemode mtime" ], desc = "Sort by modified time (reverse)" },
	{ on = [ ",", "b" ], run = [ "sort btime --reverse=no", "linemode btime" ],  desc = "Sort by birth time" },
	{ on = [ ",", "B" ], run = [ "sort btime --reverse=yes", "linemode btime" ], desc = "Sort by birth time (reverse)" },
	{ on = [ ",", "e" ], run = "sort extension --reverse=no",                    desc = "Sort by extension" },
	{ on = [ ",", "E" ], run = "sort extension --reverse=yes",                   desc = "Sort by extension (reverse)" },
	{ on = [ ",", "a" ], run = "sort alphabetical --reverse=no",                 desc = "Sort alphabetically" },
	{ on = [ ",", "A" ], run = "sort alphabetical --reverse=yes",                desc = "Sort alphabetically (reverse)" },
	{ on = [ ",", "n" ], run = "sort natural --reverse=no",                      desc = "Sort naturally" },
	{ on = [ ",", "N" ], run = "sort natural --reverse=yes",                     desc = "Sort naturally (reverse)" },
	{ on = [ ",", "s" ], run = [ "sort size --reverse=no", "linemode size" ],    desc = "Sort by size" },
	{ on = [ ",", "S" ], run = [ "sort size --reverse=yes", "linemode size" ],   desc = "Sort by size (reverse)" },
	{ on = [ ",", "r" ], run = "sort random --reverse=no",                       desc = "Sort randomly" },

	# Goto
	{ on = [ "g", "h" ],       run = "cd ~",             desc = "Go home" },
	{ on = [ "g", "c" ],       run = "cd ~/.config",     desc = "Go to .config" },
	{ on = [ "g", "d" ],       run = "cd ~/Downloads",   desc = "Go to Downloads" },
	{ on = [ "g", "<Space>" ], run = "cd --interactive", desc = "Jump interactively" },
	{ on = [ "g", "f" ],       run = "follow",           desc = "Follow hovered symlink" },
	{ on = [ "g", "p" ],       run = "cd /home/aechewhy/Pictures/",   desc = "Go to pictures" },
	{ on = [ "g", "s" ],       run = "cd '/home/aechewhy/Documents/Study Materials/'",   desc = "Go to study materials" },
	{ on = [ "g", "S" ],       run = "cd /home/aechewhy/Pictures/Screenshots",   desc = "Go to screenshots" },
	{ on = [ "g", "/" ],       run = "cd /",   desc = "Go to /" },
	{ on = [ "g", "." ],       run = "cd ~/.dotfiles",   desc = "Go to .dotfiles" },

	# Tabs
	{ on = ["t","t"], run = "tab_create --current", desc = "Create a new tab with CWD" },
	{ on = ["t","1"], run = "tab_switch 0", desc = "Switch to the first tab" },
	{ on = ["t","2"], run = "tab_switch 1", desc = "Switch to the second tab" },
	{ on = ["t","3"], run = "tab_switch 2", desc = "Switch to the third tab" },
	{ on = ["t","4"], run = "tab_switch 3", desc = "Switch to the fourth tab" },
	{ on = ["t","5"], run = "tab_switch 4", desc = "Switch to the fifth tab" },
	{ on = ["t","6"], run = "tab_switch 5", desc = "Switch to the sixth tab" },
	{ on = ["t","7"], run = "tab_switch 6", desc = "Switch to the seventh tab" },
	{ on = ["t","8"], run = "tab_switch 7", desc = "Switch to the eighth tab" },
	{ on = ["t","9"], run = "tab_switch 8", desc = "Switch to the ninth tab" },

	{ on = "<", run = "tab_switch -1 --relative", desc = "Switch to the previous tab" },
	{ on = ">", run = "tab_switch 1 --relative",  desc = "Switch to the next tab" },

	{ on = "<A-<>", run = "tab_swap -1", desc = "Swap current tab with previous tab" },
	{ on = "<A->>", run = "tab_swap 1",  desc = "Swap current tab with next tab" },


	# Tasks
	{ on = "w", run = "tasks:show", desc = "Show task manager" },

	# Help
	{ on = "<F1>", run = "help", desc = "Open help" },
  # Miscellaneous
  
  { on = [".", "y"], run = "nvim /home/aechewhy/.config/yazi", desc = "Config yazi"},
]

[tasks]

keymap = [
	{ on = "<Esc>", run = "close", desc = "Close task manager" },
	{ on = "<C-[>", run = "close", desc = "Close task manager" },
	{ on = "<C-c>", run = "close", desc = "Close task manager" },
	{ on = "w",     run = "close", desc = "Close task manager" },

	{ on = "k", run = "arrow prev", desc = "Previous task" },
	{ on = "j", run = "arrow next", desc = "Next task" },

	{ on = "<Up>",   run = "arrow prev", desc = "Previous task" },
	{ on = "<Down>", run = "arrow next", desc = "Next task" },

	{ on = "<Enter>", run = "inspect", desc = "Inspect the task" },
	{ on = "x",       run = "cancel",  desc = "Cancel the task" },

	# Help
	{ on = "~",    run = "help", desc = "Open help" },
	{ on = "<F1>", run = "help", desc = "Open help" },
]

[spot]

keymap = [
	{ on = "<Esc>", run = "close", desc = "Close the spot" },
	{ on = "<C-[>", run = "close", desc = "Close the spot" },
	{ on = "<C-c>", run = "close", desc = "Close the spot" },
	{ on = "<Tab>", run = "close", desc = "Close the spot" },

	{ on = "k", run = "arrow prev", desc = "Previous line" },
	{ on = "j", run = "arrow next", desc = "Next line" },
	{ on = "h", run = "swipe prev", desc = "Swipe to previous file" },
	{ on = "l", run = "swipe next", desc = "Swipe to next file" },

	{ on = "<Up>",    run = "arrow prev", desc = "Previous line" },
	{ on = "<Down>",  run = "arrow next", desc = "Next line" },
	{ on = "<Left>",  run = "swipe prev", desc = "Swipe to previous file" },
	{ on = "<Right>", run = "swipe next", desc = "Swipe to next file" },

	# Copy
	{ on = [ "c", "c" ], run = "copy cell", desc = "Copy selected cell" },

	# Help
	{ on = "~",    run = "help", desc = "Open help" },
	{ on = "<F1>", run = "help", desc = "Open help" },
]

[pick]

keymap = [
	{ on = "<Esc>",   run = "close",          desc = "Cancel pick" },
	{ on = "<C-[>",   run = "close",          desc = "Cancel pick" },
	{ on = "<C-c>",   run = "close",          desc = "Cancel pick" },
	{ on = "<Enter>", run = "close --submit", desc = "Submit the pick" },

	{ on = "k", run = "arrow prev", desc = "Previous option" },
	{ on = "j", run = "arrow next", desc = "Next option" },

	{ on = "<Up>",   run = "arrow prev", desc = "Previous option" },
	{ on = "<Down>", run = "arrow next", desc = "Next option" },

	# Help
	{ on = "~",    run = "help", desc = "Open help" },
	{ on = "<F1>", run = "help", desc = "Open help" },
]

[input]

keymap = [
	{ on = "<C-c>",   run = "close",          desc = "Cancel input" },
	{ on = "<Enter>", run = "close --submit", desc = "Submit input" },
	{ on = "<Esc>",   run = "escape",         desc = "Back to normal mode, or cancel input" },
	{ on = "<C-[>",   run = "escape",         desc = "Back to normal mode, or cancel input" },

	# Mode
	{ on = "i", run = "insert",                          desc = "Enter insert mode" },
	{ on = "I", run = [ "move first-char", "insert" ],   desc = "Move to the BOL, and enter insert mode" },
	{ on = "a", run = "insert --append",                 desc = "Enter append mode" },
	{ on = "A", run = [ "move eol", "insert --append" ], desc = "Move to the EOL, and enter append mode" },
	{ on = "v", run = "visual",                          desc = "Enter visual mode" },
	{ on = "r", run = "replace",                         desc = "Replace a single character" },

	# Selection
	{ on = "V",     run = [ "move bol", "visual", "move eol" ], desc = "Select from BOL to EOL" },
	{ on = "<C-A>", run = [ "move eol", "visual", "move bol" ], desc = "Select from EOL to BOL" },
	{ on = "<C-E>", run = [ "move bol", "visual", "move eol" ], desc = "Select from BOL to EOL" },

	# Character-wise movement
	{ on = "h",       run = "move -1", desc = "Move back a character" },
	{ on = "l",       run = "move 1",  desc = "Move forward a character" },
	{ on = "<Left>",  run = "move -1", desc = "Move back a character" },
	{ on = "<Right>", run = "move 1",  desc = "Move forward a character" },
	{ on = "<C-b>",   run = "move -1", desc = "Move back a character" },
	{ on = "<C-f>",   run = "move 1",  desc = "Move forward a character" },

	# Word-wise movement
	{ on = "b",         run = "backward",                    desc = "Move back to the start of the current or previous word" },
	{ on = "B",         run = "backward --far",              desc = "Move back to the start of the current or previous WORD" },
	{ on = "w",         run = "forward",                     desc = "Move forward to the start of the next word" },
	{ on = "W",         run = "forward --far",               desc = "Move forward to the start of the next WORD" },
	{ on = "e",         run = "forward --end-of-word",       desc = "Move forward to the end of the current or next word" },
	{ on = "E",         run = "forward --far --end-of-word", desc = "Move forward to the end of the current or next WORD" },
	{ on = "<A-b>",     run = "backward",                    desc = "Move back to the start of the current or previous word" },
	{ on = "<A-f>",     run = "forward --end-of-word",       desc = "Move forward to the end of the current or next word" },
	{ on = "<C-Left>",  run = "backward",                    desc = "Move back to the start of the current or previous word" },
	{ on = "<C-Right>", run = "forward --end-of-word",       desc = "Move forward to the end of the current or next word" },

	# Line-wise movement
	{ on = "0",      run = "move bol",        desc = "Move to the BOL" },
	{ on = "$",      run = "move eol",        desc = "Move to the EOL" },
	{ on = "_",      run = "move first-char", desc = "Move to the first non-whitespace character" },
	{ on = "^",      run = "move first-char", desc = "Move to the first non-whitespace character" },
	{ on = "<C-a>",  run = "move bol",        desc = "Move to the BOL" },
	{ on = "<C-e>",  run = "move eol",        desc = "Move to the EOL" },
	{ on = "<Home>", run = "move bol",        desc = "Move to the BOL" },
	{ on = "<End>",  run = "move eol",        desc = "Move to the EOL" },

	# Delete
	{ on = "<Backspace>", run = "backspace",         desc = "Delete the character before the cursor" },
	{ on = "<Delete>",    run = "backspace --under", desc = "Delete the character under the cursor" },
	{ on = "<C-h>",       run = "backspace",         desc = "Delete the character before the cursor" },
	{ on = "<C-d>",       run = "backspace --under", desc = "Delete the character under the cursor" },

	# Kill
	{ on = "<C-u>",         run = "kill bol",      desc = "Kill backwards to the BOL" },
	{ on = "<C-k>",         run = "kill eol",      desc = "Kill forwards to the EOL" },
	{ on = "<C-w>",         run = "kill backward", desc = "Kill backwards to the start of the current word" },
	{ on = "<A-d>",         run = "kill forward",  desc = "Kill forwards to the end of the current word" },
	{ on = "<C-Backspace>", run = "kill backward", desc = "Kill backwards to the start of the current word" },
	{ on = "<C-Delete>",    run = "kill forward",  desc = "Kill forwards to the end of the current word" },

	# Cut/Yank/Paste
	{ on = "d", run = "delete --cut",                                      desc = "Cut selected characters" },
	{ on = "D", run = [ "delete --cut", "move eol" ],                      desc = "Cut until EOL" },
	{ on = "c", run = "delete --cut --insert",                             desc = "Cut selected characters, and enter insert mode" },
	{ on = "C", run = [ "delete --cut --insert", "move eol" ],             desc = "Cut until EOL, and enter insert mode" },
	{ on = "s", run = [ "delete --cut --insert", "move 1" ],               desc = "Cut current character, and enter insert mode" },
	{ on = "S", run = [ "move bol", "delete --cut --insert", "move eol" ], desc = "Cut from BOL until EOL, and enter insert mode" },
	{ on = "x", run = [ "delete --cut", "move 1 --in-operating" ],         desc = "Cut current character" },
	{ on = "y", run = "yank",                                              desc = "Copy selected characters" },
	{ on = "p", run = "paste",                                             desc = "Paste copied characters after the cursor" },
	{ on = "P", run = "paste --before",                                    desc = "Paste copied characters before the cursor" },

	# Undo/Redo/Casefy
	{ on = "u",     run = [ "undo", "casefy lower" ], desc = "Undo, or lowercase if in visual mode" },
	{ on = "U",     run = "casefy upper",             desc = "Uppercase" },
	{ on = "<C-r>", run = "redo",                     desc = "Redo the last operation" },

	# Help
	{ on = "~",    run = "help", desc = "Open help" },
	{ on = "<F1>", run = "help", desc = "Open help" },
]

[confirm]

keymap = [
	{ on = "<Esc>",   run = "close",          desc = "Cancel the confirm" },
	{ on = "<C-[>",   run = "close",          desc = "Cancel the confirm" },
	{ on = "<C-c>",   run = "close",          desc = "Cancel the confirm" },
	{ on = "<Enter>", run = "close --submit", desc = "Submit the confirm" },

	{ on = "n", run = "close",          desc = "Cancel the confirm" },
	{ on = "y", run = "close --submit", desc = "Submit the confirm" },

	{ on = "k", run = "arrow prev", desc = "Previous line" },
	{ on = "j", run = "arrow next", desc = "Next line" },

	{ on = "<Up>",   run = "arrow prev", desc = "Previous line" },
	{ on = "<Down>", run = "arrow next", desc = "Next line" },

	# Help
	{ on = "~",    run = "help", desc = "Open help" },
	{ on = "<F1>", run = "help", desc = "Open help" },
]

[cmp]

keymap = [
	{ on = "<C-c>",   run = "close",                                      desc = "Cancel completion" },
	{ on = "<Tab>",   run = "close --submit",                             desc = "Submit the completion" },
	{ on = "<Enter>", run = [ "close --submit", "input:close --submit" ], desc = "Complete and submit the input" },

	{ on = "<A-k>", run = "arrow prev", desc = "Previous item" },
	{ on = "<A-j>", run = "arrow next", desc = "Next item" },

	{ on = "<Up>",   run = "arrow prev", desc = "Previous item" },
	{ on = "<Down>", run = "arrow next", desc = "Next item" },

	{ on = "<C-p>", run = "arrow prev", desc = "Previous item" },
	{ on = "<C-n>", run = "arrow next", desc = "Next item" },

	# Help
	{ on = "~",    run = "help", desc = "Open help" },
	{ on = "<F1>", run = "help", desc = "Open help" },
]

[help]

keymap = [
	{ on = "<Esc>", run = "escape", desc = "Clear the filter, or hide the help" },
	{ on = "<C-[>", run = "escape", desc = "Clear the filter, or hide the help" },
	{ on = "<C-c>", run = "close",  desc = "Hide the help" },

	# Navigation
	{ on = "k", run = "arrow prev", desc = "Previous line" },
	{ on = "j", run = "arrow next", desc = "Next line" },

	{ on = "<Up>",   run = "arrow prev", desc = "Previous line" },
	{ on = "<Down>", run = "arrow next", desc = "Next line" },

	# Filtering
	{ on = "f", run = "filter", desc = "Filter help items" },
]
